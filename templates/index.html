<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapeador de Ecopontos - ODS 13</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body>
    <header>
        <h1>♻️ EcoMapa: Cidade Tiradentes</h1>
        <p>Encontre o local certo para descartar o seu lixo eletrónico.</p>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Pesquisar por material (ex: Pilhas, Cabos...)">
        </section>

        <section class="results-section">
            <h2>Locais Disponíveis</h2>
            <div id="ecopontos-list" class="grid-container"></div>
        </section>
    </main>

    <footer>
        <p>Projeto de Extensão - Ação Climática (ODS 13)</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
